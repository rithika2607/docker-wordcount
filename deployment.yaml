apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordcount-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordcount
  template:
    metadata:
      labels:
        app: wordcount
    spec:
      containers:
      - name: wordcount-container
        image: wordcount-app
        imagePullPolicy: Never
